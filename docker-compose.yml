# Gramadoway: API + Streamlit com um comando
# Uso: docker compose up --build
# API: http://localhost:8000/docs  |  Site: http://localhost:8501

services:
  api:
    build: .
    command: uvicorn api_app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - gramado_data:/data
    environment:
      GRAMADOWAY_DATA_DIR: /data

  web:
    build: .
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - gramado_data:/data
    environment:
      GRAMADOWAY_DATA_DIR: /data
      GRAMADOWAY_API_URL: http://api:8000
    depends_on:
      - api

volumes:
  gramado_data:
